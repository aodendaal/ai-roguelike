name: Build Executables

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15-intel, macos-14, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller (macOS)
      if: startsWith(matrix.os, 'macos')
      run: |
        pyinstaller --onefile --add-data "deja10x10_gs_tc.png:." roguelike.py

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --add-data "deja10x10_gs_tc.png;." roguelike.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: roguelike-${{ matrix.os }}
        path: |
          dist/roguelike
          dist/roguelike.exe
        if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(python -c "import sys; sys.path.append('.'); from constants import VERSION; print(VERSION)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir release-assets
          # Copy Silicon Mac binary
          cp artifacts/roguelike-macos-14/roguelike release-assets/roguelike-silicon-mac
          chmod +x release-assets/roguelike-silicon-mac
          # Copy Intel Mac binary
          cp artifacts/roguelike-macos-15-intel/roguelike release-assets/roguelike-intel-mac
          chmod +x release-assets/roguelike-intel-mac
          # Copy windows binary
          cp artifacts/roguelike-windows-latest/roguelike.exe release-assets/roguelike.exe
          ls -la release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}-alpha.{1}', steps.get_version.outputs.version, github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('Release v{0}', steps.get_version.outputs.version) || format('v{0}-alpha.{1}', steps.get_version.outputs.version, github.run_number) }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: |
            release-assets/roguelike-silicon-mac
            release-assets/roguelike-intel-mac
            release-assets/roguelike.exe
          body: |
            Automatically compiled executables for macOS and Windows.
            
            - **Commit**: ${{ github.sha }}
            - **Build Run**: ${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
